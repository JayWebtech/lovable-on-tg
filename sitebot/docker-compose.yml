version: "3.9"
services:
  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/queue/index.js"]
    env_file: .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sitebot
      POSTGRES_USER: sitebot
      POSTGRES_PASSWORD: sitebot_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
